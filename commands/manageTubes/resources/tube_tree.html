<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Manage Tubes</title>
    <style>
        :root {
            --bg-primary: #3c3c3c;
            --bg-secondary: #4a4a4a;
            --bg-hover: #555555;
            --bg-selected: #0078d4;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-blue: #0696d7;
            --border-color: #5a5a5a;
            --danger-red: #d32f2f;
            --success-green: #4caf50;
            --warning-amber: #ff9800;
        }

        * {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 12px;
            padding: 8px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Info banner */
        .info-banner {
            background: rgba(6, 150, 215, 0.15);
            border: 1px solid var(--accent-blue);
            border-radius: 3px;
            padding: 8px 10px;
            margin-bottom: 10px;
            font-size: 11px;
            line-height: 1.4;
        }

        .info-banner strong {
            color: var(--accent-blue);
        }

        /* Tree container */
        .tree {
            user-select: none;
        }

        /* OD Group header */
        .od-group {
            margin-bottom: 8px;
        }

        .od-header {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 2px;
        }

        .od-header:hover {
            background: var(--bg-hover);
        }

        .expand-icon {
            width: 16px;
            font-size: 10px;
            color: var(--text-secondary);
            transition: transform 0.15s;
            flex-shrink: 0;
        }

        .od-header.expanded .expand-icon {
            transform: rotate(90deg);
        }

        .od-label {
            flex: 1;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 11px;
        }

        /* Tube items */
        .tube-list {
            margin-left: 16px;
            display: none;
        }

        .od-group.expanded .tube-list {
            display: block;
        }

        .tube-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            margin-bottom: 2px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            transition: background 0.1s;
            flex-wrap: wrap;
            gap: 4px;
        }

        .tube-item:hover {
            background: var(--bg-hover);
        }

        .tube-name {
            flex: 1;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tube-info {
            color: var(--text-secondary);
            font-size: 11px;
            margin-right: 4px;
        }

        /* Action buttons */
        .actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .action-btn {
            padding: 2px 6px;
            font-size: 10px;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.1s;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent-blue);
        }

        .action-btn.add {
            color: var(--success-green);
            border-color: var(--success-green);
        }

        .action-btn.add:hover {
            background: rgba(76, 175, 80, 0.2);
        }

        .action-btn.delete {
            color: var(--danger-red);
            border-color: var(--danger-red);
        }

        .action-btn.delete:hover {
            background: rgba(211, 47, 47, 0.2);
        }

        .action-btn.compensation {
            color: var(--warning-amber);
            border-color: var(--warning-amber);
        }

        .action-btn.compensation:hover {
            background: rgba(255, 152, 0, 0.2);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 32px 16px;
            font-size: 12px;
        }

        /* Add tube section */
        .add-tube-container {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .add-tube-btn {
            width: 100%;
            padding: 8px 16px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.1s;
        }

        .add-tube-btn:hover {
            background: #0580b8;
        }

        .refresh-btn {
            width: 100%;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="info-banner">
        <strong>Tubes</strong> define tube specifications for bender compensation.
        Tubes with matching <strong>Tube OD</strong> can be paired with compatible dies
        for bender compensation data.
    </div>

    <div class="tree" id="tubeTree">
        <div class="empty-state">Loading...</div>
    </div>

    <div class="add-tube-container">
        <button class="add-tube-btn" onclick="addTube()">+ Add Tube</button>
        <button class="action-btn refresh-btn" onclick="refreshTubes()">Refresh</button>
    </div>

    <script>
        // State
        let tubes = [];
        let expandedODs = new Set();

        // Fusion communication handler - receives messages from Python
        window.fusionJavaScriptHandler = {
            handle: function(action, data) {
                try {
                    switch (action) {
                        case 'loadTubes':
                            tubes = JSON.parse(data);
                            // Auto-expand all OD groups
                            const ods = [...new Set(tubes.map(t => t.tube_od))];
                            ods.forEach(od => expandedODs.add(od));
                            renderTree();
                            return 'OK';

                        case 'updateTube':
                            const updated = JSON.parse(data);
                            updateTubeInList(updated);
                            renderTree();
                            return 'OK';

                        case 'addTubeToList':
                            const newTube = JSON.parse(data);
                            tubes.push(newTube);
                            expandedODs.add(newTube.tube_od);
                            renderTree();
                            return 'OK';

                        case 'removeTube':
                            const tubeId = data;
                            tubes = tubes.filter(t => t.id !== tubeId);
                            renderTree();
                            return 'OK';

                        default:
                            return 'UNKNOWN_ACTION: ' + action;
                    }
                } catch (e) {
                    console.error('Handler error:', e);
                    return 'ERROR: ' + e.message;
                }
            }
        };

        // Send message to Python
        function sendToFusion(action, data) {
            if (typeof adsk !== 'undefined' && adsk.fusionSendData) {
                return adsk.fusionSendData(action, JSON.stringify(data));
            } else {
                console.log('Would send to Fusion:', action, data);
                return Promise.resolve('OK');
            }
        }

        // Group tubes by tube OD
        function groupByOD(tubes) {
            const groups = {};
            for (const tube of tubes) {
                const od = tube.tube_od;
                if (!groups[od]) {
                    groups[od] = {
                        tube_od: od,
                        tube_od_display: tube.tube_od_display,
                        tubes: []
                    };
                }
                groups[od].tubes.push(tube);
            }
            // Sort by OD value
            return Object.values(groups).sort((a, b) => a.tube_od - b.tube_od);
        }

        // Render tree from state
        function renderTree() {
            const container = document.getElementById('tubeTree');

            if (tubes.length === 0) {
                container.innerHTML = '<div class="empty-state">No tubes configured.<br><br>Click "+ Add Tube" to create one.</div>';
                return;
            }

            const groups = groupByOD(tubes);
            let html = '';

            for (const group of groups) {
                const isExpanded = expandedODs.has(group.tube_od);
                const expandClass = isExpanded ? 'expanded' : '';
                const count = group.tubes.length;

                html += `
                    <div class="od-group ${expandClass}" data-od="${group.tube_od}">
                        <div class="od-header ${expandClass}" onclick="toggleOD(${group.tube_od})">
                            <span class="expand-icon">&#9654;</span>
                            <span class="od-label">Tube OD: ${group.tube_od_display} (${count} tube${count !== 1 ? 's' : ''})</span>
                        </div>
                        <div class="tube-list">
                            ${renderTubes(group.tubes)}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function renderTubes(tubes) {
            return tubes.map(tube => {
                const batchInfo = tube.batch ? ` [${escapeHtml(tube.batch)}]` : '';
                const matInfo = tube.material_type ? ` <span class="tube-info">${escapeHtml(tube.material_type)}</span>` : '';
                const wallInfo = tube.wall_thickness_display ? ` <span class="tube-info">Wall: ${escapeHtml(tube.wall_thickness_display)}</span>` : '';
                return `
                    <div class="tube-item" data-id="${escapeAttr(tube.id)}">
                        <span class="tube-name">${escapeHtml(tube.name)}${batchInfo}</span>
                        ${matInfo}${wallInfo}
                        <div class="actions">
                            <button class="action-btn compensation" onclick="manageCompensation('${escapeAttr(tube.id)}')" title="Manage Compensation Data">&#x1F4CA;</button>
                            <button class="action-btn" onclick="editTube('${escapeAttr(tube.id)}')" title="Edit Tube">&#x270E;</button>
                            <button class="action-btn delete" onclick="deleteTube('${escapeAttr(tube.id)}')" title="Delete Tube">&#x2715;</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Tree interaction
        function toggleOD(tubeOD) {
            if (expandedODs.has(tubeOD)) {
                expandedODs.delete(tubeOD);
            } else {
                expandedODs.add(tubeOD);
            }
            renderTree();
        }

        // CRUD actions - delegate to Python
        function addTube() {
            sendToFusion('addTube', {});
        }

        function refreshTubes() {
            sendToFusion('requestTubes', {});
        }

        function editTube(tubeId) {
            sendToFusion('editTube', { tube_id: tubeId });
        }

        function deleteTube(tubeId) {
            sendToFusion('deleteTube', { tube_id: tubeId });
        }

        function manageCompensation(tubeId) {
            sendToFusion('manageCompensation', { tube_id: tubeId });
        }

        // Helpers
        function escapeHtml(text) {
            if (text == null) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function escapeAttr(text) {
            if (text == null) return '';
            return String(text).replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function updateTubeInList(updated) {
            const idx = tubes.findIndex(t => t.id === updated.id);
            if (idx >= 0) {
                tubes[idx] = updated;
            } else {
                tubes.push(updated);
            }
        }

        // Request initial data when page loads
        document.addEventListener('DOMContentLoaded', function() {
            sendToFusion('requestTubes', {});

            // Retry after a short delay if no data received
            setTimeout(function() {
                if (tubes.length === 0) {
                    sendToFusion('requestTubes', {});
                }
            }, 200);
        });
    </script>
</body>
</html>
